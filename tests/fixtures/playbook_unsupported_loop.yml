# Literal-list ``loop:`` is supported. A Jinja-templated loop value is
# not yet supported because resolving it would need runtime variable
# evaluation, so the converter must refuse this shape.
- name: bad
  hosts: localhost
  gather_facts: no
  tasks:
    - name: dynamic loop
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ users_from_inventory }}"
